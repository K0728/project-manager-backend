<!DOCTYPE html>
<html>
<head>
    <title>Project Manager Dashboard</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 40px;
            background: #f9f9f9;
        }

        .card {
            display: inline-block;
            padding: 20px;
            margin: 10px;
            border-radius: 10px;
            background: #ffffff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            width: 120px;
        }

        .form-box {
            margin-top: 40px;
            padding: 20px;
            background: #ffffff;
            display: inline-block;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        input, select {
            padding: 8px;
            margin: 5px;
            width: 200px;
        }

        button {
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }

        table {
            margin: 30px auto;
            border-collapse: collapse;
            width: 70%;
            background: white;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
        }

        th {
            background: #4CAF50;
            color: white;
        }

        .delete-btn {
            background: red;
            padding: 5px 10px;
        }

        .delete-btn:hover {
            background: darkred;
        }
    </style>
</head>

<body>

<h1>📊 Project Dashboard</h1>
<h3>Live Data from API 🚀</h3>

<!-- Dashboard Cards -->
<div class="card">
    <h2>Total</h2>
    <p id="total">0</p>
</div>

<div class="card">
    <h2>Completed</h2>
    <p id="completed">0</p>
</div>

<div class="card">
    <h2>Pending</h2>
    <p id="pending">0</p>
</div>

<div class="card">
    <h2>Overdue</h2>
    <p id="overdue">0</p>
</div>

<!-- Add Task Form -->
<div class="form-box">
    <h2>Add New Task</h2>

    <input type="text" id="title" placeholder="Task Title"><br>

    <select id="status">
        <option value="TODO">TODO</option>
        <option value="IN_PROGRESS">IN_PROGRESS</option>
        <option value="DONE">DONE</option>
    </select><br>

    <input type="date" id="deadline"><br>

    <button onclick="addTask()">Add Task</button>
</div>

<!-- Task Table -->
<h2>📋 All Tasks</h2>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Status</th>
        <th>Deadline</th>
        <th>Action</th>
    </tr>
    </thead>
    <tbody id="taskTable"></tbody>
</table>

<script>

    const BASE_URL = "https://project-manager-backend-production-0a96.up.railway.app";

    // Load dashboard data
    function loadDashboard() {
        fetch(`${BASE_URL}/dashboard`)
        .then(res => res.json())
        .then(data => {
            document.getElementById("total").innerText = data.totalTasks;
            document.getElementById("completed").innerText = data.completedTasks;
            document.getElementById("pending").innerText = data.pendingTasks;
            document.getElementById("overdue").innerText = data.overdueTasks;
        });
    }

    // Load tasks list
    function loadTasks() {
        fetch(`${BASE_URL}/tasks`)
        .then(res => res.json())
        .then(tasks => {
            let table = document.getElementById("taskTable");
            table.innerHTML = "";

            tasks.forEach(task => {
                table.innerHTML += `
                    <tr>
                        <td>${task.id}</td>
                        <td>${task.title}</td>
                        <td>${task.status}</td>
                        <td>${task.deadline}</td>
                        <td>
                            <button class="delete-btn" onclick="deleteTask(${task.id})">Delete</button>
                        </td>
                    </tr>
                `;
            });
        });
    }

    // Add new task
    function addTask() {

        const task = {
            title: document.getElementById("title").value,
            status: document.getElementById("status").value,
            deadline: document.getElementById("deadline").value,
            projectId: 1
        };

        fetch(`${BASE_URL}/tasks`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(task)
        })
        .then(res => res.json())
        .then(() => {
            alert("Task Added ✅");

            // clear form
            document.getElementById("title").value = "";
            document.getElementById("deadline").value = "";

            loadDashboard();
            loadTasks();
        });
    }

    // Delete task
    function deleteTask(id) {
        fetch(`${BASE_URL}/tasks/${id}`, {
            method: "DELETE"
        })
        .then(() => {
            alert("Task Deleted ❌");
            loadDashboard();
            loadTasks();
        });
    }

    // Initial load
    loadDashboard();
    loadTasks();

</script>

</body>
</html>
