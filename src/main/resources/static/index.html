<!DOCTYPE html>
<html>
<head>
    <title>Project Manager Dashboard</title>
    <style>
        body { font-family: Arial; text-align: center; margin-top: 50px; }
        .card { display: inline-block; padding: 20px; margin: 10px; border-radius: 10px; background: #f4f4f4; }
    </style>
</head>
<body>

<h1>📊 Project Dashboard</h1>

<div class="card">
    <h2>Total</h2>
    <p id="total">0</p>
</div>

<div class="card">
    <h2>Completed</h2>
    <p id="completed">0</p>
</div>

<div class="card">
    <h2>Pending</h2>
    <p id="pending">0</p>
</div>

<div class="card">
    <h2>Overdue</h2>
    <p id="overdue">0</p>
</div>

<script>
    fetch("https://project-manager-backend-production-0a96.up.railway.app/dashboard")
    .then(res => res.json())
    .then(data => {
        document.getElementById("total").innerText = data.totalTasks;
        document.getElementById("completed").innerText = data.completedTasks;
        document.getElementById("pending").innerText = data.pendingTasks;
        document.getElementById("overdue").innerText = data.overdueTasks;
    })
    .catch(err => console.error(err));
</script>

</body>
</html>
